<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Login — RFT Recruitment</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%232f6bff'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-family='Archivo,sans-serif' font-weight='900' font-size='20' fill='white'%3ER%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#2f6bff;--char:#16181b;--char2:#1f2227;--off:#f4f2ee;
    --lineD:#2c3036;--muted:#6c727a;--line:#dad7d0;
    --sans:"Archivo",system-ui,sans-serif;--mono:"Space Mono",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:var(--sans);background:var(--char);color:var(--off);
    min-height:100vh;display:grid;place-items:center;position:relative;overflow:hidden
  }
  body::before{
    content:'';position:absolute;inset:0;pointer-events:none;
    background-image:linear-gradient(var(--lineD) 1px,transparent 1px),linear-gradient(90deg,var(--lineD) 1px,transparent 1px);
    background-size:64px 64px;opacity:.45;
    -webkit-mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,#000 20%,transparent 80%);
    mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,#000 20%,transparent 80%);
  }
  .card{
    position:relative;background:#fff;color:var(--char);
    border-radius:22px;padding:46px 42px;width:100%;max-width:420px;
    box-shadow:0 32px 80px -20px rgba(0,0,0,.55);
  }
  .logo{display:flex;align-items:center;gap:12px;margin-bottom:34px}
  .mk{
    width:42px;height:42px;background:var(--blue);color:#fff;
    display:grid;place-items:center;border-radius:11px;
    font-size:19px;font-weight:900;font-family:var(--sans);flex-shrink:0
  }
  .logo-text b{display:block;font-size:22px;font-weight:900;letter-spacing:-.04em;line-height:1;color:var(--char)}
  .logo-text .tag{font-family:var(--mono);font-size:8.5px;letter-spacing:.22em;text-transform:uppercase;color:#9aa3ad;margin-top:3px;display:block}
  .kicker{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--blue);margin-bottom:8px}
  h1{font-size:28px;font-weight:800;letter-spacing:-.03em;margin-bottom:32px;color:var(--char)}
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:18px}
  label{font-size:12.5px;font-weight:600;color:#555}
  input{
    font-family:var(--sans);font-size:15px;padding:12px 14px;
    border:1px solid #ddd;border-radius:10px;outline:none;color:var(--char);
    transition:border-color .2s,box-shadow .2s;background:var(--off);
    -webkit-appearance:none;appearance:none;
  }
  input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(47,107,255,.16);background:#fff}
  .submit-btn{
    width:100%;font-family:var(--sans);font-weight:700;font-size:15px;
    padding:14px;border:none;border-radius:11px;background:var(--char);color:#fff;
    cursor:pointer;transition:background .2s,transform .15s;margin-top:6px;
    display:flex;align-items:center;justify-content:center;gap:9px;
  }
  .submit-btn:hover:not(:disabled){background:#000;transform:translateY(-1px)}
  .submit-btn:disabled{opacity:.5;cursor:not-allowed}
  .error{
    display:none;font-size:13px;font-weight:600;color:#e5484d;
    background:#fff3f3;border:1px solid rgba(229,72,77,.22);
    border-radius:8px;padding:11px 14px;margin-top:14px;
  }
  .error.show{display:block}
  .back{
    display:block;text-align:center;margin-top:22px;
    font-size:13px;color:var(--muted);font-family:var(--mono);
    font-size:10px;letter-spacing:.1em;text-transform:uppercase;
    text-decoration:none;
  }
  .back:hover{color:var(--char)}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="mk" aria-hidden="true">R</div>
    <div class="logo-text">
      <b>RFT</b>
      <span class="tag">Right First Time</span>
    </div>
  </div>
  <p class="kicker">Admin Portal</p>
  <h1>Sign In</h1>
  <form id="loginForm" novalidate>
    <div class="field">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" autocomplete="email" required placeholder="you@rftrecruitment.co.uk">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="submit-btn" id="submitBtn">
      Sign In to Admin
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </button>
    <p class="error" id="errorMsg" role="alert"></p>
  </form>
  <a class="back" href="/">← Back to site</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
(function(){
  'use strict';
  var SUPABASE_URL='https://npbfhpzjsaxesewsucbz.supabase.co';
  var SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5wYmZocHpqc2F4ZXNld3N1Y2J6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTEzMzQsImV4cCI6MjA5NzI2NzMzNH0.F_e0A_rgYPj3Tn2nSy6rwrWNT_WywMcG7XdApz80cR8';
  var db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

  // Already logged in → go straight to dashboard
  db.auth.getSession().then(function(r){
    if(r.data&&r.data.session) window.location.replace('dashboard.html');
  });

  var form=document.getElementById('loginForm');
  var btn=document.getElementById('submitBtn');
  var errEl=document.getElementById('errorMsg');

  form.addEventListener('submit',function(e){
    e.preventDefault();
    btn.disabled=true;
    btn.innerHTML='Signing in… <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';
    errEl.classList.remove('show');
    var email=document.getElementById('email').value.trim();
    var password=document.getElementById('password').value;
    db.auth.signInWithPassword({email:email,password:password}).then(function(r){
      if(r.error){
        errEl.textContent=r.error.message;
        errEl.classList.add('show');
        btn.disabled=false;
        btn.innerHTML='Sign In to Admin <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';
      } else {
        window.location.href='dashboard.html';
      }
    });
  });
})();
</script>
</body>
</html>
